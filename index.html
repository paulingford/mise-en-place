<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- no-referrer breaks many recipe CDNs; allow a normal cross-origin referrer for images. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Mise en place</title>
    <!-- Embedded browsers (e.g. Simple Browser) need a real chain of height for flex layouts. -->
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <p style="margin: 0; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; color: #333">
        Loading…
      </p>
    </div>
    <noscript>JavaScript is required to run this app.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
